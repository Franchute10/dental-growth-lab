<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIG-EP v3.1 - Producción Final</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: "#0ea5e9", secondary: "#1a365d" }, 
                    fontFamily: { body: ["Outfit", "sans-serif"] } 
                } 
            }
        };
    </script>
</head>
<body class="bg-slate-50 font-body">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // REEMPLAZA ESTA URL CON TU URL DE IMPLEMENTACIÓN DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEq943FLzB7RzPlwH8HyZN5-LVUQpj4vpfn6a-Qe4y9_Hg4uYEGNtgUa76YXHpfUq4/exec";

        const App = () => {
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // Estado de mensajes: El saludo inicial ahora es directo pidiendo el nombre
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
            ]);

            useEffect(() => { 
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
            }, [messages, isTyping]);

            const enviarMensajeChat = async () => {
                if (!chatInput.trim()) return;
                const userMsg = chatInput.trim();
                
                // Añadir mensaje del usuario a la UI
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setChatInput('');
                setIsTyping(true);

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ mensaje: userMsg })
                    });
                    const data = await response.json();
                    
                    // Añadir respuesta de la IA a la UI
                    setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, hubo un problema de conexión. ¿Podrías intentar de nuevo?" }]);
                } finally { 
                    setIsTyping(false); 
                }
            };

            return (
                <div className="min-h-screen p-4 sm:p-8 flex flex-col items-center justify-center">
                    <div className="max-w-3xl w-full bg-white p-8 sm:p-12 rounded-[2.5rem] shadow-2xl text-center border border-slate-100">
                        <div className="mb-6 inline-flex p-4 bg-sky-50 rounded-3xl text-primary">
                            <span className="material-icons-outlined text-5xl">auto_awesome</span>
                        </div>
                        <h1 className="text-4xl sm:text-5xl font-black mb-4 italic tracking-tight text-secondary">
                            MIG-EP <span className="text-primary font-bold not-italic text-2xl">v3.1</span>
                        </h1>
                        <p className="text-slate-500 uppercase font-black text-[10px] tracking-[0.3em] mb-8">
                            Innovation Lab - Dental Growth Assistant
                        </p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8 text-left">
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <span className="block text-[9px] font-black text-slate-400 uppercase mb-1">Status</span>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    <span className="text-xs font-bold text-slate-700">Sistema Conectado</span>
                                </div>
                            </div>
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <span className="block text-[9px] font-black text-slate-400 uppercase mb-1">Motor IA</span>
                                <span className="text-xs font-bold text-slate-700">Gemini 1.5 Flash - Enterprise</span>
                            </div>
                        </div>
                        <button 
                            onClick={() => setIsChatOpen(true)} 
                            className="bg-primary text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest hover:scale-105 transition-all shadow-xl shadow-sky-200 flex items-center justify-center gap-3 mx-auto"
                        >
                            <span className="material-icons-outlined">chat</span>
                            Iniciar Validación Comercial
                        </button>
                    </div>

                    {/* Widget del Chat */}
                    <div className={`fixed bottom-6 right-6 z-[100] transition-all duration-500 transform ${isChatOpen ? 'scale-100 opacity-100 translate-y-0' : 'scale-90 opacity-0 translate-y-10 pointer-events-none'}`}>
                        <div className="w-[340px] sm:w-[380px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col h-[550px] overflow-hidden">
                            {/* Header del Chat */}
                            <div className="bg-secondary p-6 text-white flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-white/10">
                                        <span className="material-icons-outlined text-primary text-xl">smart_toy</span>
                                    </div>
                                    <div>
                                        <h4 className="text-sm font-bold leading-none">Asistente Dental</h4>
                                        <span className="text-[10px] text-sky-300 font-medium tracking-wide">Sede Chacarilla</span>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setIsChatOpen(false)}
                                    className="w-8 h-8 rounded-lg hover:bg-white/10 transition-colors flex items-center justify-center"
                                >
                                    <i className="material-icons-outlined text-lg">close</i>
                                </button>
                            </div>

                            {/* Cuerpo de Mensajes */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-4 rounded-2xl text-xs max-w-[85%] shadow-sm ${
                                            m.role === 'user' 
                                            ? 'bg-primary text-white rounded-tr-none' 
                                            : 'bg-white border border-slate-100 text-slate-700 rounded-tl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="bg-white border border-slate-100 p-3 rounded-2xl rounded-tl-none flex gap-1">
                                            <div className="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce"></div>
                                            <div className="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                                            <div className="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input del Chat */}
                            <div className="p-4 bg-white border-t border-slate-50 flex gap-2">
                                <input 
                                    type="text" 
                                    className="flex-1 bg-slate-100 rounded-2xl px-5 text-xs outline-none focus:ring-2 focus:ring-primary/30 transition-all border-none" 
                                    placeholder="Escribe tu respuesta aquí..." 
                                    value={chatInput} 
                                    onChange={e => setChatInput(e.target.value)} 
                                    onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()} 
                                />
                                <button 
                                    onClick={enviarMensajeChat} 
                                    className="bg-primary text-white w-12 h-12 rounded-2xl hover:bg-secondary transition-colors flex items-center justify-center shadow-lg shadow-sky-100"
                                >
                                    <i className="material-icons-outlined">send</i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {/* Botón flotante para abrir chat (solo si está cerrado) */}
                    {!isChatOpen && (
                        <button 
                            onClick={() => setIsChatOpen(true)} 
                            className="fixed bottom-6 right-6 w-16 h-16 bg-primary text-white rounded-[1.5rem] shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-[90] group"
                        >
                            <div className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-white"></div>
                            <i className="material-icons-outlined text-3xl group-hover:rotate-12 transition-transform">message</i>
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
