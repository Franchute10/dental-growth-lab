<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIG-EP v3.3 - Producción Final</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: "#0ea5e9", secondary: "#1a365d" }, 
                    fontFamily: { body: ["Outfit", "sans-serif"] } 
                } 
            }
        };
    </script>
</head>
<body class="bg-slate-50 font-body">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // REEMPLAZA ESTA URL CON TU URL DE GOOGLE APPS SCRIPT v11.1
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEq943FLzB7RzPlwH8HyZN5-LVUQpj4vpfn6a-Qe4y9_Hg4uYEGNtgUa76YXHpfUq4/exec";

        const App = () => {
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // Generar un ID de sesión único al cargar la página
            const [sessionId, setSessionId] = useState(() => "web_" + Math.random().toString(36).substr(2, 9));

            // Mensajes iniciales
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
            ]);

            useEffect(() => { 
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
            }, [messages, isTyping]);

            const reiniciarChat = () => {
                setSessionId("web_" + Math.random().toString(36).substr(2, 9));
                setMessages([{ role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }]);
                setChatInput('');
            };

            const enviarMensajeChat = async () => {
                if (!chatInput.trim()) return;
                const userMsg = chatInput.trim();
                
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setChatInput('');
                setIsTyping(true);

                try {
                    // Nota: Usamos POST con body stringify. celular se usa como sessionID en el script
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "cors", // Cambiado a cors para asegurar recepción de respuesta JSON
                        headers: { "Content-Type": "text/plain" }, 
                        body: JSON.stringify({ 
                            mensaje: userMsg,
                            celular: sessionId 
                        })
                    });
                    
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
                } catch (e) {
                    console.error("Error de conexión:", e);
                    setMessages(prev => [...prev, { role: 'bot', text: "Lo siento Frank, tuve un pequeño parpadeo en la conexión. ¿Podrías repetirme eso último?" }]);
                } finally { 
                    setIsTyping(false); 
                }
            };

            return (
                <div className="min-h-screen p-4 sm:p-8 flex flex-col items-center justify-center relative">
                    
                    {/* Header Principal */}
                    <div className="max-w-4xl w-full bg-white p-8 sm:p-12 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center mb-8">
                        <div className="mb-4 inline-flex p-4 bg-sky-50 rounded-3xl text-primary">
                            <span className="material-icons-outlined text-5xl">auto_awesome</span>
                        </div>
                        <h1 className="text-4xl font-black italic text-secondary mb-2">MIG-EP <span className="text-primary text-xl not-italic">v3.3</span></h1>
                        <p className="text-slate-400 uppercase font-bold text-[10px] tracking-widest">Sede Chacarilla - AI Sales Agent</p>
                        
                        <div className="mt-8 flex flex-wrap justify-center gap-4">
                            <button onClick={() => setIsChatOpen(true)} className="bg-primary text-white px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg hover:scale-105 transition-transform flex items-center gap-2">
                                <span className="material-icons-outlined">chat</span> Abrir Chat de Ventas
                            </button>
                            <button onClick={reiniciarChat} className="bg-slate-100 text-slate-500 px-8 py-4 rounded-2xl font-black uppercase text-xs hover:bg-slate-200 transition-colors flex items-center gap-2">
                                <span className="material-icons-outlined text-sm">refresh</span> Reiniciar Sesión
                            </button>
                        </div>
                    </div>

                    {/* Widget del Chat */}
                    <div className={`fixed bottom-6 right-6 z-[100] transition-all duration-500 transform ${isChatOpen ? 'scale-100 opacity-100 translate-y-0' : 'scale-90 opacity-0 translate-y-10 pointer-events-none'}`}>
                        <div className="w-[340px] sm:w-[400px] bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col h-[550px] overflow-hidden">
                            {/* Header Chat */}
                            <div className="bg-secondary p-5 text-white flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center">
                                        <span className="material-icons-outlined text-primary">smart_toy</span>
                                    </div>
                                    <div>
                                        <h4 className="text-sm font-bold leading-none">Asistente Dental</h4>
                                        <span className="text-[10px] text-sky-300 font-medium">En línea</span>
                                    </div>
                                </div>
                                <button onClick={() => setIsChatOpen(false)} className="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center">
                                    <i className="material-icons-outlined text-lg">close</i>
                                </button>
                            </div>

                            {/* Cuerpo */}
                            <div className="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-50/50">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-4 rounded-2xl text-[13px] leading-relaxed max-w-[85%] shadow-sm ${
                                            m.role === 'user' 
                                            ? 'bg-primary text-white rounded-tr-none' 
                                            : 'bg-white border border-slate-100 text-slate-700 rounded-tl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="bg-white border border-slate-100 px-4 py-2 rounded-2xl rounded-tl-none flex gap-1">
                                            <div className="w-1 h-1 bg-sky-400 rounded-full animate-bounce"></div>
                                            <div className="w-1 h-1 bg-sky-400 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                            <div className="w-1 h-1 bg-sky-400 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input */}
                            <div className="p-4 bg-white border-t border-slate-50 flex gap-2">
                                <input 
                                    type="text" 
                                    className="flex-1 bg-slate-100 rounded-2xl px-5 text-sm outline-none border-none focus:ring-2 focus:ring-primary/30" 
                                    placeholder="Escribe tu respuesta..." 
                                    value={chatInput} 
                                    onChange={e => setChatInput(e.target.value)} 
                                    onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()} 
                                />
                                <button onClick={enviarMensajeChat} className="bg-primary text-white w-12 h-12 rounded-2xl hover:bg-secondary transition-colors flex items-center justify-center">
                                    <i className="material-icons-outlined">send</i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {!isChatOpen && (
                        <button onClick={() => setIsChatOpen(true)} className="fixed bottom-6 right-6 w-16 h-16 bg-primary text-white rounded-[1.5rem] shadow-xl flex items-center justify-center hover:scale-110 transition-all z-[90]">
                            <i className="material-icons-outlined text-3xl">forum</i>
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
