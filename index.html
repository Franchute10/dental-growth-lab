<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SISTEMA MIG-EP v12.5 - Centro de Mando Dental</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0ea5e9",
                        secondary: "#1a365d",
                        accent: "#23c2ad",
                    },
                    fontFamily: {
                        display: ["Outfit", "sans-serif"],
                        body: ["Outfit", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        .gradient-bg { background: linear-gradient(135deg, rgba(26, 54, 93, 0.05) 0%, rgba(14, 165, 233, 0.08) 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // URL DE TU IMPLEMENTACIÓN DE GOOGLE APPS SCRIPT v12.4
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoHI5zCs0o28D8A9mpDrmtwueM8VzZ-vG0dmWirHE1VxuNtZtKPvVVi9euvbCZTWRB/exec";

    const App = () => {
        const [isChatOpen, setIsChatOpen] = useState(false);
        const [formData, setFormData] = useState({ nombre: '', email: '', telefono: '', servicio: '' });
        const [chatInput, setChatInput] = useState('');
        const [isTyping, setIsTyping] = useState(false);
        const [messages, setMessages] = useState([
            { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
        ]);
        const chatEndRef = useRef(null);

        const sessionId = useMemo(() => {
            const saved = localStorage.getItem('mig_ep_session_v12');
            if (saved) return saved;
            const nid = "web_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('mig_ep_session_v12', nid);
            return nid;
        }, []);

        // Trigger para abrir el chat automáticamente a los 8 segundos
        useEffect(() => {
            const timer = setTimeout(() => { setIsChatOpen(true); }, 8000);
            return () => clearTimeout(timer);
        }, []);

        useEffect(() => { 
            if (isChatOpen) chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
        }, [messages, isTyping, isChatOpen]);

        // Función corregida para registro manual sin bloqueos de conexión
        const handleFormSubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Sincronizando...";
            
            try {
                // Usamos mode: 'no-cors' para asegurar que el envío no falle por políticas del navegador
                // Esto garantiza que los datos lleguen al Google Sheet aunque no podamos leer la respuesta
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        mensaje: "REGISTRO_MANUAL_WEB",
                        nombre: formData.nombre,
                        email: formData.email,
                        celular: formData.telefono,
                        servicio: formData.servicio
                    })
                });
                
                // Esperamos un momento breve para asegurar el envío y procedemos al redireccionamiento
                setTimeout(() => {
                    window.open(`https://wa.me/51924200094?text=Hola,%20soy%20${formData.nombre}.%20Consulto%20por%20${formData.servicio}.`, '_blank');
                    btn.disabled = false;
                    btn.innerText = "Registrar y Validar";
                }, 1000);

            } catch (err) {
                console.error("Error en registro manual:", err);
                btn.disabled = false;
                btn.innerText = "Registrar y Validar";
            }
        };

        const enviarMensajeChat = async () => {
            if (!chatInput.trim()) return;
            const msg = chatInput.trim();
            setMessages(prev => [...prev, { role: 'user', text: msg }]);
            setChatInput('');
            setIsTyping(true);

            try {
                // Para el chat sí necesitamos procesar la respuesta JSON
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ mensaje: msg, celular: sessionId })
                });
                const data = await response.json();
                setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
            } catch (e) {
                console.error("Error en chat:", e);
                setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, tuve un pequeño problema de conexión. ¿Podrías intentar de nuevo?" }]);
            } finally {
                setIsTyping(false);
            }
        };

        return (
            <div className="min-h-screen flex flex-col overflow-x-hidden">
                {/* 0. BARRA ACADÉMICA */}
                <div className="bg-secondary text-white text-[10px] py-2 text-center font-black tracking-[0.2em] uppercase">
                    PROYECTO DE TRANSFORMACIÓN DIGITAL – CAPSTONE CUC UNIVERSITY – MODELO MIG-EP
                </div>

                <nav className="sticky top-0 z-50 glass-panel border-b border-slate-200">
                    <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center shadow-xl text-primary">
                                <span className="material-icons-outlined text-3xl">terminal</span>
                            </div>
                            <div>
                                <span className="text-xl font-black text-slate-900 tracking-tighter uppercase italic block leading-none">Growth<span className="text-primary">Lab</span></span>
                                <span className="text-[9px] text-slate-400 font-bold uppercase tracking-widest leading-none mt-1">Innovation Engine</span>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center gap-8">
                            <a href="#problema" className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary">El Problema</a>
                            <a href="#solucion" className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Solución</a>
                            <a href="#dashboard" className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Validación</a>
                            <div className="h-8 w-px bg-slate-200"></div>
                            <span className="text-[10px] font-black text-green-500 bg-green-50 px-3 py-1 rounded-full uppercase">Sede Chacarilla Activa</span>
                        </div>
                    </div>
                </nav>

                <main className="flex-1">
                    {/* 1. HERO SECTION - IMPACTO */}
                    <section className="text-center py-20 px-4 gradient-bg border-b border-slate-100">
                        <div className="max-w-5xl mx-auto">
                            <h1 className="text-4xl md:text-6xl font-black text-secondary leading-[1.1] tracking-tight">
                                Las clínicas dentales pierden hasta <br/>
                                <span className="text-primary underline decoration-slate-200 underline-offset-8">40% de sus pacientes</span><br/>
                                por mala gestión de leads
                            </h1>
                            <p className="mt-8 text-lg lg:text-xl text-slate-500 max-w-3xl mx-auto leading-relaxed italic">
                                MIG-EP es un modelo de transformación comercial que convierte conversaciones en ingresos medibles mediante automatización, trazabilidad y analítica en tiempo real.
                            </p>
                            <div className="mt-12 flex justify-center gap-4">
                                <button onClick={() => setIsChatOpen(true)} className="bg-primary text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-2xl hover:scale-105 transition-all">
                                    Agendar con IA
                                </button>
                                <a href="#dashboard" className="bg-white border border-slate-200 text-slate-600 px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-slate-50 transition-all">
                                    Ver Resultados
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* 2. PROBLEMA (CAPSTONE CORE) */}
                    <section id="problema" className="py-24 bg-white">
                        <div className="max-w-5xl mx-auto px-4 text-center">
                            <h2 className="text-3xl lg:text-4xl font-black text-secondary mb-10 uppercase italic">Problema del Sector Odontológico</h2>
                            <p className="text-slate-600 text-lg leading-relaxed mb-16">
                                En clínicas dentales, la mayoría de consultas se gestionan vía WhatsApp sin estructura, lo que genera pérdida de leads, baja conversión y alta tasa de inasistencia (no-show). La ausencia de métricas impide tomar decisiones estratégicas.
                            </p>
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { t: 'Leads sin seguimiento', d: 'Consultas perdidas por falta de trazabilidad inmediata.' },
                                    { t: 'No-show elevado', d: 'Altas tasas de inasistencia por falta de protocolos de confirmación.' },
                                    { t: 'Falta de indicadores', d: 'Decisiones basadas en intuición y no en datos medibles.' }
                                ].map((item, i) => (
                                    <div key={i} className="p-8 bg-slate-50 rounded-3xl border border-slate-100 group hover:border-primary transition-all">
                                        <div className="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center mb-6 text-rose-500 group-hover:bg-rose-500 group-hover:text-white transition-all">
                                            <span className="material-icons-outlined">error_outline</span>
                                        </div>
                                        <h3 className="font-black text-secondary mb-3 uppercase text-sm">{item.t}</h3>
                                        <p className="text-xs text-slate-400 italic">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 3. SOLUCIÓN MIG-EP */}
                    <section id="solucion" className="py-24 gradient-bg">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <h2 className="text-3xl lg:text-4xl font-black text-secondary mb-12 uppercase italic">Modelo MIG-EP</h2>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[
                                    { i: 'bolt', t: 'Captura', d: 'IA Conversacional 24/7' },
                                    { i: 'storage', t: 'Registro', d: 'CRM en Google Sheets' },
                                    { i: 'sync', t: 'Seguimiento', d: 'Automatización Comercial' },
                                    { i: 'query_stats', t: 'Analítica', d: 'KPIs en Tiempo Real' }
                                ].map((item, idx) => (
                                    <div key={idx} className="p-8 bg-white rounded-[2.5rem] shadow-xl border border-slate-100 text-center">
                                        <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-primary">
                                            <span className="material-icons-outlined text-3xl">{item.i}</span>
                                        </div>
                                        <h3 className="font-black text-secondary mb-2 uppercase text-sm">{item.t}</h3>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 4. DEMOSTRACIÓN (DASHBOARD) */}
                    <section id="dashboard" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl lg:text-4xl font-black text-secondary uppercase italic leading-none">Resultados en Tiempo Real</h2>
                                <p className="text-slate-500 mt-4 italic">Datos reales del piloto en sede Chacarilla sincronizados con el Repositorio</p>
                            </div>
                            <div className="bg-white p-4 rounded-[3.5rem] shadow-2xl border border-slate-100 flex flex-col h-[650px] relative">
                                <div className="flex justify-between items-center px-8 py-4 border-b border-slate-50">
                                    <div className="flex items-center gap-3">
                                        <span className="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
                                        <h3 className="font-black uppercase tracking-widest text-[10px] text-slate-400">Panel de Control Gerencial (Looker Studio)</h3>
                                    </div>
                                    <span className="text-[9px] font-black text-primary bg-sky-50 px-3 py-1 rounded-full uppercase italic">Live Sincro</span>
                                </div>
                                <div className="flex-1 rounded-[2.5rem] overflow-hidden bg-slate-50 mt-4">
                                    <iframe src="https://lookerstudio.google.com/embed/reporting/81a4bc5e-2ab0-47ba-97df-958db6ec4bb4/page/9tlqF" className="w-full h-full border-none" allowFullScreen />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 5. VALIDACIÓN DEL MODELO */}
                    <section className="py-24 bg-slate-900 text-white relative overflow-hidden">
                        <div className="max-w-5xl mx-auto px-4 text-center">
                            <h2 className="text-3xl font-black mb-8 italic uppercase">Validación del Modelo</h2>
                            <p className="text-slate-400 text-lg leading-relaxed max-w-3xl mx-auto mb-16">
                                El modelo MIG-EP fue validado mediante implementación piloto, permitiendo medir de forma objetiva la recuperación de ingresos y la eficiencia comercial.
                            </p>
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { v: '54%', t: 'Conversión' },
                                    { v: '4.5m', t: 'SLA Respuesta' },
                                    { v: '48%', t: 'No-show Detectado' }
                                ].map((stat, i) => (
                                    <div key={i} className="bg-white/5 border border-white/10 p-10 rounded-[2.5rem]">
                                        <h3 className="text-5xl font-black text-primary mb-2">{stat.v}</h3>
                                        <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400">{stat.t}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* 6. CIERRE / REGISTRO MANUAL */}
                    <section className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 text-center mb-16">
                            <h2 className="text-4xl font-black text-secondary leading-tight italic">Convierte tus leads en <span className="text-primary underline underline-offset-8">ingresos reales</span></h2>
                            <p className="text-slate-500 mt-6 max-w-2xl mx-auto">MIG-EP no es solo un chatbot. Es un sistema de gestión comercial medible para el sector odontológico.</p>
                        </div>
                        <div className="max-w-3xl mx-auto bg-slate-50 p-10 rounded-[3rem] border border-slate-100 shadow-inner">
                            <h3 className="text-xl font-bold mb-8 flex items-center gap-2 justify-center"><span className="material-icons-outlined text-primary">person_add</span> Registro Directo de Lead</h3>
                            <form onSubmit={handleFormSubmit} className="space-y-4">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <input type="text" placeholder="Nombre completo" required className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary" value={formData.nombre} onChange={e => setFormData({...formData, nombre: e.target.value})} />
                                    <input type="email" placeholder="Correo electrónico" required className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <input type="tel" placeholder="Número WhatsApp" required className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary" value={formData.telefono} onChange={e => setFormData({...formData, telefono: e.target.value})} />
                                    <select required className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary italic text-slate-400" value={formData.servicio} onChange={e => setFormData({...formData, servicio: e.target.value})}>
                                        <option value="">Selecciona Tratamiento</option>
                                        <option value="Evaluacion Dental">Evaluacion Dental</option>
                                        <option value="Profilaxis Pro">Profilaxis Pro</option>
                                        <option value="Implantes Dentales">Implantes Dentales</option>
                                        <option value="Estetica Dental">Estetica Dental</option>
                                        <option value="Ortodoncia">Ortodoncia</option>
                                        <option value="Blanqueamiento">Blanqueamiento</option>
                                        <option value="Endodoncia">Endodoncia</option>
                                    </select>
                                </div>
                                <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-primary transition-all active:scale-95">Registrar y Validar</button>
                            </form>
                        </div>
                    </section>
                </main>

                <footer className="bg-secondary text-white py-12 border-t border-white/5">
                    <div className="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8 text-[10px] font-bold uppercase tracking-[0.2em]">
                        <div className="text-center md:text-left">
                            <span className="text-lg italic tracking-tighter">Growth<span className="text-primary">Lab</span></span>
                            <p className="text-slate-400 mt-1">Ecosistema de Innovación Aplicada © 2026</p>
                        </div>
                        <div className="text-center md:text-right">
                            <span>Frank Espinoza | Consultoría Estratégica MIG-EP</span>
                        </div>
                    </div>
                </footer>

                {/* CHAT WIDGET INTEGRADO CON v12.4 */}
                <div className={`fixed bottom-6 right-6 z-[100] transition-all duration-500 transform ${isChatOpen ? 'scale-100 opacity-100' : 'scale-0 opacity-0 pointer-events-none'}`}>
                    <div className="w-[340px] sm:w-[400px] bg-white rounded-[2.5rem] shadow-[0_20px_80px_-15px_rgba(0,0,0,0.3)] border border-slate-100 flex flex-col h-[580px] overflow-hidden">
                        <div className="bg-secondary p-6 text-white flex justify-between items-center shadow-lg relative overflow-hidden">
                            <div className="flex items-center gap-4 relative z-10">
                                <div className="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-white/10">
                                    <span className="material-icons-outlined text-primary">smart_toy</span>
                                </div>
                                <div>
                                    <h4 className="text-sm font-bold leading-none mb-1 tracking-tight">Asistente Dental Pro</h4>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                                        <span className="text-[9px] text-sky-300 font-bold uppercase tracking-widest">En línea v12.5</span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => setIsChatOpen(false)} className="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors relative z-10">
                                <i className="material-icons-outlined text-lg">close</i>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 chat-scroll">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`p-4 rounded-2xl text-[13px] leading-relaxed max-w-[85%] shadow-sm font-medium ${
                                        m.role === 'user' 
                                        ? 'bg-primary text-white rounded-tr-none' 
                                        : 'bg-white border border-slate-100 text-slate-600 rounded-tl-none'
                                    }`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="bg-white border border-slate-100 px-4 py-3 rounded-2xl rounded-tl-none flex gap-1.5 items-center">
                                        <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                                        <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                                        <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce"></div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-5 bg-white border-t border-slate-50 flex gap-3">
                            <input 
                                type="text" 
                                className="flex-1 bg-slate-100 rounded-2xl px-5 text-sm outline-none border-none focus:ring-2 focus:ring-primary/30 transition-all" 
                                placeholder="Escribe tu respuesta..." 
                                value={chatInput} 
                                onChange={e => setChatInput(e.target.value)} 
                                onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()} 
                            />
                            <button onClick={enviarMensajeChat} className="bg-primary text-white w-12 h-12 rounded-2xl hover:bg-secondary transition-all flex items-center justify-center shadow-lg active:scale-90">
                                <span className="material-icons-outlined">send</span>
                            </button>
                        </div>
                    </div>
                </div>

                {/* BOTÓN FLOTANTE */}
                {!isChatOpen && (
                    <button onClick={() => setIsChatOpen(true)} className="fixed bottom-8 right-8 w-20 h-20 bg-primary text-white rounded-[2rem] shadow-[0_20px_50px_-10px_rgba(14,165,233,0.5)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-[90] group">
                        <i className="material-icons-outlined text-4xl group-hover:rotate-12 transition-transform">forum</i>
                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full border-2 border-white flex items-center justify-center text-[10px] font-black">1</span>
                    </button>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
