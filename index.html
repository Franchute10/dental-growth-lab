<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIG-EP v11.5 - Producción Dental</title>
    
    <!-- Librerías Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0ea5e9",
                        secondary: "#1a365d",
                        accent: "#23c2ad",
                    },
                    fontFamily: {
                        body: ["Outfit", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        .gradient-bg { background: linear-gradient(135deg, rgba(14, 165, 233, 0.08) 0%, rgba(35, 194, 173, 0.05) 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // URL DE TU IMPLEMENTACIÓN DE GOOGLE APPS SCRIPT (v11.5)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEq943FLzB7RzPlwH8HyZN5-LVUQpj4vpfn6a-Qe4y9_Hg4uYEGNtgUa76YXHpfUq4/exec";

        const App = () => {
            const [formData, setFormData] = useState({ nombre: '', email: '', telefono: '', servicio: '' });
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // Persistencia de sesión para evitar reinicios por refresco de página
            const sessionId = useMemo(() => {
                const savedId = localStorage.getItem('mig_ep_session_v11_5');
                if (savedId) return savedId;
                const newId = "web_" + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('mig_ep_session_v11_5', newId);
                return newId;
            }, []);

            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
            ]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, isTyping]);

            const enviarLead = async (e) => {
                e.preventDefault();
                try {
                    await fetch(SCRIPT_URL, { 
                        method: "POST", 
                        mode: "no-cors", 
                        body: JSON.stringify({ ...formData, fuente: "Web Enterprise v11.5" }) 
                    });
                    // Redirección directa a WhatsApp tras registro manual
                    const waLink = `https://wa.me/51924200094?text=Hola, soy ${formData.nombre}. Consulto por ${formData.servicio || 'atención dental'}.`;
                    window.open(waLink, '_blank');
                } catch (err) {
                    console.error("Error en formulario:", err);
                }
            };

            const enviarMensajeChat = async () => {
                if (!chatInput.trim()) return;
                const msgText = chatInput.trim();
                
                setMessages(prev => [...prev, { role: 'user', text: msgText }]);
                setChatInput('');
                setIsTyping(true);

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ 
                            mensaje: msgText, 
                            celular: sessionId 
                        })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, tuve un pequeño parpadeo en la conexión. ¿Podrías intentar enviarlo de nuevo?" }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="min-h-screen gradient-bg flex flex-col">
                    {/* Top Bar Académica */}
                    <div className="bg-secondary text-white text-[10px] py-2 text-center font-black tracking-[0.2em] uppercase">
                        CAPSTONE PROJECT CUC – SISTEMA DE OPTIMIZACIÓN AGÉNTICA v11.5
                    </div>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-8 grid lg:grid-cols-2 gap-8 items-stretch overflow-hidden">
                        
                        {/* Panel Izquierdo: Gestión y Data */}
                        <div className="flex flex-col gap-6 overflow-y-auto pr-2 custom-scroll h-full">
                            
                            {/* Card de Registro */}
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 relative overflow-hidden group">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-sky-50 rounded-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
                                
                                <div className="relative z-10">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-sky-100">
                                            <span className="material-icons-outlined text-2xl">person_add_alt</span>
                                        </div>
                                        <div>
                                            <h2 className="text-2xl font-black italic tracking-tight text-secondary">Registro <span className="text-primary">MIG-EP</span></h2>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-1">Captura de Leads Manual</p>
                                        </div>
                                    </div>

                                    <form onSubmit={enviarLead} className="space-y-4">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input 
                                                type="text" 
                                                placeholder="Nombre del Paciente" 
                                                className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-primary/40 text-sm transition-all shadow-inner" 
                                                value={formData.nombre} 
                                                onChange={e => setFormData({...formData, nombre: e.target.value})} 
                                                required
                                            />
                                            <input 
                                                type="tel" 
                                                placeholder="Número WhatsApp" 
                                                className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-primary/40 text-sm transition-all shadow-inner" 
                                                value={formData.telefono} 
                                                onChange={e => setFormData({...formData, telefono: e.target.value})} 
                                                required
                                            />
                                        </div>
                                        <select 
                                            className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-primary/40 text-sm italic text-slate-500 transition-all shadow-inner"
                                            value={formData.servicio} 
                                            onChange={e => setFormData({...formData, servicio: e.target.value})}
                                            required
                                        >
                                            <option value="">Selecciona Tratamiento</option>
                                            <option value="Ortodoncia">Ortodoncia</option>
                                            <option value="Implantes Dentales">Implantes Dentales</option>
                                            <option value="Estetica Dental">Estetica Dental</option>
                                            <option value="Profilaxis Pro">Profilaxis Pro</option>
                                            <option value="Evaluacion Dental">Evaluacion Dental</option>
                                        </select>
                                        <button 
                                            type="submit" 
                                            className="w-full bg-secondary text-white py-4 rounded-2xl font-black uppercase text-xs shadow-xl shadow-slate-200 hover:bg-primary hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3"
                                        >
                                            <span className="material-icons-outlined text-sm">rocket_launch</span>
                                            Registrar y Contactar
                                        </button>
                                    </form>
                                </div>
                            </div>

                            {/* Card de Analytics */}
                            <div className="bg-white p-4 rounded-[2.5rem] shadow-xl border border-slate-100 flex-1 min-h-[400px] flex flex-col">
                                <div className="flex justify-between items-center px-4 py-2 border-b border-slate-50 mb-4">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                        <span className="material-icons-outlined text-sm text-primary">analytics</span>
                                        Dashboard Gerencial Chacarilla
                                    </h3>
                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                        <span className="text-[9px] font-bold text-green-600 uppercase">Live Sincro</span>
                                    </div>
                                </div>
                                <div className="flex-1 rounded-3xl overflow-hidden shadow-inner bg-slate-50">
                                    <iframe 
                                        src="https://lookerstudio.google.com/embed/reporting/81a4bc5e-2ab0-47ba-97df-958db6ec4bb4/page/9tlqF" 
                                        className="w-full h-full border-none" 
                                        allowFullScreen 
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Panel Derecho: IA Sales Agent */}
                        <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden h-full relative">
                            {/* Header del Chat */}
                            <div className="bg-secondary p-6 text-white flex justify-between items-center shadow-lg relative z-10">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-primary/20 rounded-2xl flex items-center justify-center border border-white/10 relative">
                                        <span className="material-icons-outlined text-primary text-2xl">smart_toy</span>
                                        <div className="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-secondary rounded-full animate-pulse"></div>
                                    </div>
                                    <div>
                                        <h4 className="text-base font-bold leading-none mb-1">Asistente Dental Pro</h4>
                                        <span className="text-[10px] text-sky-300 font-bold uppercase tracking-widest">IA Conversacional Activa</span>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <span className="block text-[8px] font-black text-white/50 uppercase tracking-tighter">SLA Target</span>
                                    <span className="text-xs font-black text-primary">INSTANT</span>
                                </div>
                            </div>

                            {/* Cuerpo de Mensajes */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 chat-scroll">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                                        <div className={`p-4 rounded-3xl text-[13px] leading-relaxed max-w-[85%] shadow-sm ${
                                            m.role === 'user' 
                                            ? 'bg-primary text-white rounded-tr-none' 
                                            : 'bg-white border border-slate-100 text-slate-700 rounded-tl-none font-medium'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start animate-fade-in">
                                        <div className="bg-white border border-slate-100 px-5 py-4 rounded-3xl rounded-tl-none flex gap-1.5 items-center shadow-sm">
                                            <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                                            <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                                            <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce"></div>
                                            <span className="ml-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">IA Procesando...</span>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input del Chat */}
                            <div className="p-6 bg-white border-t border-slate-50 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
                                <div className="flex gap-3 bg-slate-100 p-2 rounded-[2rem] border border-slate-200 focus-within:ring-2 focus-within:ring-primary/30 transition-all">
                                    <input 
                                        type="text" 
                                        className="flex-1 bg-transparent px-5 text-sm outline-none border-none placeholder:text-slate-400" 
                                        placeholder="Escribe tu respuesta aquí..." 
                                        value={chatInput} 
                                        onChange={e => setChatInput(e.target.value)} 
                                        onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()} 
                                    />
                                    <button 
                                        onClick={enviarMensajeChat} 
                                        className="bg-primary text-white w-12 h-12 rounded-full hover:bg-secondary transition-all flex items-center justify-center shadow-lg shadow-sky-200 active:scale-90"
                                    >
                                        <span className="material-icons-outlined">send</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer Info */}
                    <div className="px-8 py-4 flex justify-between items-center text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] border-t border-slate-200/50">
                        <span>Consultor: Frank Espinoza</span>
                        <span>Innovation & Sales Lab – CUC 2026</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
