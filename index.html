<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SISTEMA MIG-EP - Optimización Dental</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>

<script>

tailwind.config = {
darkMode:"class",
theme:{
extend:{
colors:{
primary:"#0ea5e9",
secondary:"#23c2ad",
"background-light":"#f8fafc",
"background-dark":"#0f172a",
},
fontFamily:{
display:["Outfit","sans-serif"],
body:["Outfit","sans-serif"],
},
borderRadius:{
DEFAULT:"12px",
large:"24px",
},
},
},
};


/* ======================================================
FORMULARIO ORIGINAL (SIN CAMBIAR FLUJO)
====================================================== */

async function enviarLead(event){

event.preventDefault();

const btn=document.getElementById('btnSubmit');
const status=document.getElementById('formStatus');

btn.disabled=true;
btn.innerHTML="Procesando...";

const telefonoLimpio=document.getElementById('telefono').value.replace(/\D/g,'');

const formData={
nombre:document.getElementById('nombre').value,
celular:telefonoLimpio,
servicio:document.getElementById('servicio').value,
fuente:"Validación Web Lab"
};

const webhookURL="https://script.google.com/macros/s/AKfycbzhtIlg32sshx-IkSmI3Lr7xivAFpP8MIpPupE31ZlK8IbOP0JtgpMCK4XS8WWqe-tq/exec";

await fetch(webhookURL,{
method:"POST",
mode:"no-cors",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(formData)
});

status.innerHTML="✅ Registro exitoso";

setTimeout(()=>{

const mensaje=`Hola, soy ${formData.nombre}. Consulto sobre el servicio de ${formData.servicio}.`;

window.open(`https://wa.me/51924200094?text=${encodeURIComponent(mensaje)}`,'_blank');

document.getElementById('leadForm').reset();

btn.disabled=false;
btn.innerHTML="Iniciar Validación Real";

},1500);

}


/* ======================================================
CHATBOT IA (NO INTERFIERE CON FORMULARIO)
====================================================== */

const CHAT_API="https://script.google.com/macros/s/AKfycbzhtIlg32sshx-IkSmI3Lr7xivAFpP8MIpPupE31ZlK8IbOP0JtgpMCK4XS8WWqe-tq/exec";

function agregarMensaje(texto,tipo){

const container=document.getElementById("chatMessages");

const div=document.createElement("div");

div.style.marginBottom="10px";

if(tipo==="user"){
div.style.textAlign="right";
div.innerHTML=`<span style="background:#0ea5e9;color:white;padding:8px 12px;border-radius:12px">${texto}</span>`;
}

if(tipo==="bot"){
div.innerHTML=`<span style="background:#f1f5f9;padding:8px 12px;border-radius:12px">${texto}</span>`;
}

container.appendChild(div);

container.scrollTop=container.scrollHeight;

}

async function enviarMensaje(){

const input=document.getElementById("chatInput");

const texto=input.value.trim();

if(!texto) return;

agregarMensaje(texto,"user");

input.value="";

try{

await fetch(CHAT_API,{
method:"POST",
mode:"no-cors",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
mensaje:texto,
fuente:"Chat Web"
})
});

agregarMensaje("Mensaje recibido. Un asesor responderá pronto.","bot");

}catch(e){

agregarMensaje("Error al enviar el mensaje.","bot");

}

}

</script>

<style>

body{
font-family:'Outfit',sans-serif;
scroll-behavior:smooth;
}

.gradient-bg{
background:linear-gradient(135deg,rgba(14,165,233,0.12)0%,rgba(35,194,173,0.05)100%);
}

.form-input{
background:#f8fafc;
border:1px solid #e2e8f0;
transition:all .2s;
}

.form-input:focus{
background:white;
border-color:#0ea5e9;
box-shadow:0 0 0 4px rgba(14,165,233,.1);
}

</style>

</head>


<body class="bg-background-light text-slate-700">

<header class="py-20 gradient-bg">

<div class="max-w-4xl mx-auto px-6">

<h1 class="text-4xl font-black text-slate-900 mb-8">

Dental Growth Lab

</h1>

<form id="leadForm" onsubmit="enviarLead(event)" class="space-y-4">

<input type="text"
id="nombre"
placeholder="Nombre completo"
required
class="form-input w-full px-5 py-4 rounded-2xl">

<input type="tel"
id="telefono"
placeholder="WhatsApp (9 dígitos)"
required
class="form-input w-full px-5 py-4 rounded-2xl">

<select
id="servicio"
required
class="form-input w-full px-5 py-4 rounded-2xl">

<option value="">Servicio</option>
<option value="Profilaxis Pro">Profilaxis Pro</option>
<option value="Implantes Dentales">Implantes Dentales</option>
<option value="Carillas">Carillas</option>
<option value="Ortodoncia">Ortodoncia</option>
<option value="Blanqueamiento">Blanqueamiento</option>

</select>

<button
type="submit"
id="btnSubmit"
class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black">

Iniciar Validación Real

</button>

<p id="formStatus"></p>

</form>

</div>

</header>


<section class="py-20">

<div class="max-w-7xl mx-auto px-6">

<iframe
src="https://lookerstudio.google.com/embed/reporting/81a4bc5e-2ab0-47ba-97df-958db6ec4bb4/page/9tlqF"
width="100%"
height="600"
style="border:0;border-radius:20px">
</iframe>

</div>

</section>



<!-- CHATBOT -->

<div
style="position:fixed;bottom:20px;right:20px;width:320px;font-family:Outfit;z-index:9999">

<div
style="background:#0ea5e9;color:white;padding:12px 16px;border-radius:14px 14px 0 0;font-weight:700">

Asistente Sonrisa Segura

</div>

<div
id="chatMessages"
style="background:white;height:320px;overflow-y:auto;padding:14px;border-left:1px solid #eee;border-right:1px solid #eee">

<span style="background:#f1f5f9;padding:8px 12px;border-radius:12px;display:inline-block">
Hola 👋 Soy el asistente virtual de Sonrisa Segura. ¿En qué puedo ayudarte?
</span>

</div>

<div style="display:flex;border:1px solid #eee;border-top:none">

<input
id="chatInput"
placeholder="Escribe tu consulta..."
style="flex:1;padding:10px;border:none;outline:none;font-size:14px">

<button
onclick="enviarMensaje()"
style="background:#0ea5e9;color:white;border:none;padding:10px 16px;font-weight:600">

Enviar

</button>

</div>

</div>

</body>
</html>
