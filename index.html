<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIG-EP v11.6 - Producción Dental</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: "#0ea5e9", secondary: "#1a365d" }, fontFamily: { body: ["Outfit", "sans-serif"] } } }
        };
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, rgba(14, 165, 233, 0.08) 0%, rgba(35, 194, 173, 0.05) 100%); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoHI5zCs0o28D8A9mpDrmtwueM8VzZ-vG0dmWirHE1VxuNtZtKPvVVi9euvbCZTWRB/exec";

        const App = () => {
            const [formData, setFormData] = useState({ nombre: '', telefono: '', servicio: '' });
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const sessionId = useMemo(() => {
                const saved = localStorage.getItem('mig_ep_v11_6');
                if (saved) return saved;
                const nid = "web_" + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('mig_ep_v11_6', nid);
                return nid;
            }, []);

            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
            ]);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isTyping]);

            const enviarMensajeChat = async () => {
                if (!chatInput.trim()) return;
                const msg = chatInput.trim();
                setMessages(prev => [...prev, { role: 'user', text: msg }]);
                setChatInput('');
                setIsTyping(true);

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ mensaje: msg, celular: sessionId })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, tuve un problema de conexión. ¿Podrías intentar de nuevo?" }]);
                } finally { setIsTyping(false); }
            };

            return (
                <div className="min-h-screen gradient-bg flex flex-col h-screen overflow-hidden">
                    <div className="bg-secondary text-white text-[9px] py-1.5 text-center font-black tracking-widest uppercase">CAPSTONE CUC - SISTEMA AGÉNTICO v11.6</div>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-6 grid lg:grid-cols-2 gap-6 items-stretch overflow-hidden">
                        
                        {/* PANEL IZQUIERDO */}
                        <div className="flex flex-col gap-4 overflow-hidden h-full">
                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 shrink-0">
                                <h2 className="text-xl font-black italic text-secondary mb-4 flex items-center gap-2">
                                    <span className="material-icons-outlined text-primary">person_add</span> Registro MIG-EP
                                </h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <input type="text" placeholder="Nombre" className="p-3 bg-slate-50 rounded-xl text-sm border-none outline-none focus:ring-1 focus:ring-primary" value={formData.nombre} onChange={e => setFormData({...formData, nombre: e.target.value})} />
                                    <input type="tel" placeholder="WhatsApp" className="p-3 bg-slate-50 rounded-xl text-sm border-none outline-none focus:ring-1 focus:ring-primary" value={formData.telefono} onChange={e => setFormData({...formData, telefono: e.target.value})} />
                                </div>
                                <button className="w-full mt-3 bg-secondary text-white py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-primary transition-all">Registrar Lead</button>
                            </div>

                            <div className="bg-white p-4 rounded-[2rem] shadow-xl border border-slate-100 flex-1 overflow-hidden flex flex-col">
                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2">Dashboard Real-Time</span>
                                <div className="flex-1 rounded-2xl overflow-hidden bg-slate-50 shadow-inner">
                                    <iframe src="https://lookerstudio.google.com/embed/reporting/81a4bc5e-2ab0-47ba-97df-958db6ec4bb4/page/9tlqF" className="w-full h-full border-none" allowFullScreen />
                                </div>
                            </div>
                        </div>

                        {/* CHAT DERECHO */}
                        <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden h-full">
                            <div className="bg-secondary p-5 text-white flex justify-between items-center shadow-lg">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-white/10"><span className="material-icons-outlined text-primary text-xl">smart_toy</span></div>
                                    <div><h4 className="text-sm font-bold leading-none mb-1">Asistente Dental</h4><span className="text-[9px] text-sky-300 font-bold uppercase tracking-widest">Sede Chacarilla</span></div>
                                </div>
                                <div className="text-right"><span className="text-[8px] font-black text-white/50 uppercase">v11.6 Sync</span></div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-50/30 chat-scroll">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-4 rounded-[1.5rem] text-[13px] max-w-[85%] shadow-sm ${m.role === 'user' ? 'bg-primary text-white rounded-tr-none' : 'bg-white border text-slate-700 rounded-tl-none font-medium'}`}>{m.text}</div>
                                    </div>
                                ))}
                                {isTyping && <div className="flex gap-1 items-center p-3 bg-white w-fit rounded-full shadow-sm"><div className="w-1 h-1 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div><div className="w-1 h-1 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div><div className="w-1 h-1 bg-sky-400 rounded-full animate-bounce"></div></div>}
                                <div ref={chatEndRef} />
                            </div>

                            <div className="p-4 bg-white border-t border-slate-50">
                                <div className="flex gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200 focus-within:ring-2 focus-within:ring-primary/30">
                                    <input type="text" className="flex-1 bg-transparent px-3 text-sm outline-none border-none" placeholder="Escribe tu respuesta..." value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()} />
                                    <button onClick={enviarMensajeChat} className="bg-primary text-white w-10 h-10 rounded-xl hover:bg-secondary transition-all flex items-center justify-center active:scale-95"><span className="material-icons-outlined text-sm">send</span></button>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
