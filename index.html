<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIG-EP v3.4 - Producción Final</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: "#0ea5e9", secondary: "#1a365d" }, 
                    fontFamily: { body: ["Outfit", "sans-serif"] } 
                } 
            }
        };
    </script>
</head>
<body class="bg-slate-50 font-body">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // REEMPLAZA ESTA URL CON TU URL DE GOOGLE APPS SCRIPT v11.1
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEq943FLzB7RzPlwH8HyZN5-LVUQpj4vpfn6a-Qe4y9_Hg4uYEGNtgUa76YXHpfUq4/exec";

        const App = () => {
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // PERSISTENCIA: Obtenemos el ID de sesión del localStorage o creamos uno nuevo
            const [sessionId, setSessionId] = useState(() => {
                const savedId = localStorage.getItem('mig_ep_session_id');
                if (savedId) return savedId;
                const newId = "web_" + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('mig_ep_session_id', newId);
                return newId;
            });

            // Mensajes iniciales
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
            ]);

            useEffect(() => { 
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
            }, [messages, isTyping]);

            const reiniciarChat = () => {
                const newId = "web_" + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('mig_ep_session_id', newId);
                setSessionId(newId);
                setMessages([{ role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }]);
                setChatInput('');
            };

            const enviarMensajeChat = async () => {
                if (!chatInput.trim()) return;
                const userMsg = chatInput.trim();
                
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setChatInput('');
                setIsTyping(true);

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "cors", 
                        headers: { "Content-Type": "text/plain" }, 
                        body: JSON.stringify({ 
                            mensaje: userMsg,
                            celular: sessionId 
                        })
                    });
                    
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
                } catch (e) {
                    console.error("Error de conexión:", e);
                    setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, tuve un pequeño problema de conexión. ¿Podrías intentar enviarlo de nuevo?" }]);
                } finally { 
                    setIsTyping(false); 
                }
            };

            return (
                <div className="min-h-screen p-4 sm:p-8 flex flex-col items-center justify-center relative">
                    
                    {/* Header Principal con Dashboard Estático */}
                    <div className="max-w-4xl w-full bg-white p-8 sm:p-12 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center mb-8 relative overflow-hidden">
                        <div className="absolute -top-10 -right-10 w-40 h-40 bg-sky-50 rounded-full opacity-50"></div>
                        
                        <div className="relative z-10">
                            <div className="mb-4 inline-flex p-4 bg-sky-50 rounded-3xl text-primary">
                                <span className="material-icons-outlined text-5xl">auto_awesome</span>
                            </div>
                            <h1 className="text-4xl font-black italic text-secondary mb-2 tracking-tighter">
                                MIG-EP <span className="text-primary text-xl not-italic tracking-normal">v3.4</span>
                            </h1>
                            <p className="text-slate-400 uppercase font-black text-[10px] tracking-[0.3em] mb-8">Innovation & Sales Lab</p>
                            
                            <div className="flex flex-wrap justify-center gap-4">
                                <button 
                                    onClick={() => setIsChatOpen(true)} 
                                    className="bg-primary text-white px-10 py-4 rounded-2xl font-black uppercase text-xs shadow-xl shadow-sky-100 hover:scale-105 active:scale-95 transition-all flex items-center gap-3"
                                >
                                    <span className="material-icons-outlined">chat</span> Abrir Chat de Validación
                                </button>
                                <button 
                                    onClick={reiniciarChat} 
                                    className="bg-slate-50 text-slate-400 px-10 py-4 rounded-2xl font-black uppercase text-xs hover:bg-slate-100 transition-colors flex items-center gap-3 border border-slate-100"
                                >
                                    <span className="material-icons-outlined text-sm">refresh</span> Resetear Sesión
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Widget del Chat */}
                    <div className={`fixed bottom-6 right-6 z-[100] transition-all duration-500 transform ${isChatOpen ? 'scale-100 opacity-100 translate-y-0' : 'scale-90 opacity-0 translate-y-10 pointer-events-none'}`}>
                        <div className="w-[340px] sm:w-[400px] bg-white rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.2)] border border-slate-100 flex flex-col h-[600px] overflow-hidden">
                            {/* Header Chat */}
                            <div className="bg-secondary p-6 text-white flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-white/10">
                                        <span className="material-icons-outlined text-primary">smart_toy</span>
                                    </div>
                                    <div>
                                        <h4 className="text-sm font-bold leading-none mb-1">Asistente Dental</h4>
                                        <div className="flex items-center gap-1.5">
                                            <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                                            <span className="text-[9px] text-sky-300 font-bold uppercase tracking-wider">En línea</span>
                                        </div>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setIsChatOpen(false)} 
                                    className="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors"
                                >
                                    <i className="material-icons-outlined text-lg">close</i>
                                </button>
                            </div>

                            {/* Cuerpo de Mensajes */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/30">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`p-4 rounded-2xl text-[13px] leading-relaxed max-w-[85%] shadow-sm font-medium ${
                                            m.role === 'user' 
                                            ? 'bg-primary text-white rounded-tr-none' 
                                            : 'bg-white border border-slate-100 text-slate-600 rounded-tl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="bg-white border border-slate-100 px-4 py-3 rounded-2xl rounded-tl-none flex gap-1.5 items-center">
                                            <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                                            <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                                            <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce"></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input del Chat */}
                            <div className="p-5 bg-white border-t border-slate-50 flex gap-3">
                                <input 
                                    type="text" 
                                    className="flex-1 bg-slate-100 rounded-2xl px-5 text-sm outline-none border-none focus:ring-2 focus:ring-primary/30 transition-all" 
                                    placeholder="Escribe tu mensaje..." 
                                    value={chatInput} 
                                    onChange={e => setChatInput(e.target.value)} 
                                    onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()} 
                                />
                                <button 
                                    onClick={enviarMensajeChat} 
                                    className="bg-primary text-white w-12 h-12 rounded-2xl hover:bg-secondary transition-all flex items-center justify-center shadow-lg shadow-sky-100 active:scale-90"
                                >
                                    <i className="material-icons-outlined">send</i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {!isChatOpen && (
                        <button 
                            onClick={() => setIsChatOpen(true)} 
                            className="fixed bottom-6 right-6 w-16 h-16 bg-primary text-white rounded-[1.5rem] shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-[90] group"
                        >
                            <i className="material-icons-outlined text-3xl group-hover:rotate-12 transition-transform">forum</i>
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
