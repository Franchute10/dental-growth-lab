<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MIG-EP — Modelo Integral de Gestión Comercial | Dental Growth Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0ea5e9",
                        secondary: "#1a365d",
                        accent: "#23c2ad",
                    },
                    fontFamily: {
                        display: ["Outfit", "sans-serif"],
                        body: ["Outfit", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        .gradient-bg { background: linear-gradient(135deg, rgba(26, 54, 93, 0.05) 0%, rgba(14, 165, 233, 0.08) 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
        @keyframes checkPop { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .check-pop { animation: checkPop 0.4s ease-out forwards; }

        /* DT phases connector line */
        .dt-connector { position: relative; }
        .dt-connector::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -20px;
            width: 20px;
            height: 2px;
            background: linear-gradient(90deg, #0ea5e9, #1a365d);
            z-index: 10;
        }
        @media (max-width: 768px) { .dt-connector::after { display: none; } }

        /* Architecture flow arrows */
        .arch-arrow { color: #0ea5e9; font-size: 1.5rem; }

        /* KPI card hover */
        .kpi-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(14,165,233,0.15); }

        /* Fade in on scroll (simple CSS approach) */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwniOlmxvYYUK1bw0Y5DNkPCaH_Us64rrYOpU7TYmqpngbtnRrLrrCOt9dIlWWj8e4Z/exec";
    const EMPTY_FORM = { nombre: '', email: '', telefono: '', servicio: '' };

    // ── Design Thinking phases data ──────────────────────────────────────────
    const DT_PHASES = [
        {
            icon: 'favorite',
            fase: 'Empatizar',
            num: '01',
            color: 'bg-rose-50 border-rose-200 text-rose-600',
            iconColor: 'text-rose-500',
            desc: 'Entrevistas al personal administrativo de Sonrisa Segura. Mapeo del journey del paciente desde el primer contacto digital.',
            output: 'Mapa de empatía + puntos de dolor identificados'
        },
        {
            icon: 'travel_explore',
            fase: 'Definir',
            num: '02',
            color: 'bg-amber-50 border-amber-200 text-amber-600',
            iconColor: 'text-amber-500',
            desc: '"¿Cómo podríamos estructurar el proceso de atención digital para reducir la pérdida de leads y no-shows en clínicas odontológicas?"',
            output: 'HMW statement + árbol del problema'
        },
        {
            icon: 'lightbulb',
            fase: 'Idear',
            num: '03',
            color: 'bg-yellow-50 border-yellow-200 text-yellow-600',
            iconColor: 'text-yellow-500',
            desc: 'Brainstorming de soluciones. Selección del Modelo MIG-EP: 4 pilares (Captura, Registro, Seguimiento, Analítica) sobre stack tecnológico accesible.',
            output: 'Framework MIG-EP definido'
        },
        {
            icon: 'build',
            fase: 'Prototipar',
            num: '04',
            color: 'bg-sky-50 border-sky-200 text-sky-600',
            iconColor: 'text-sky-500',
            desc: 'Desarrollo del sistema: chatbot IA con GAS, CRM en Sheets, dashboard en Looker Studio, landing page de captura de leads.',
            output: 'Sistema funcional en producción'
        },
        {
            icon: 'verified',
            fase: 'Validar',
            num: '05',
            color: 'bg-green-50 border-green-200 text-green-600',
            iconColor: 'text-green-500',
            desc: 'Piloto activo en Sede Chacarilla. Medición de KPIs reales: tasa de conversión, SLA de respuesta, tasa de no-show identificado.',
            output: '59 leads | 45.76% conversión | 4.82 min SLA'
        },
    ];

    // ── Architecture nodes ───────────────────────────────────────────────────
    const ARCH_NODES = [
        { icon: 'forum', label: 'Paciente / Web', sub: 'WhatsApp o formulario', color: 'bg-slate-100 border-slate-200' },
        { icon: 'code', label: 'Google Apps Script', sub: 'Motor de IA + lógica', color: 'bg-sky-50 border-sky-200' },
        { icon: 'table_chart', label: 'Google Sheets', sub: 'CRM + hoja Citas', color: 'bg-green-50 border-green-200' },
        { icon: 'bar_chart', label: 'Looker Studio', sub: 'Dashboard de KPIs', color: 'bg-purple-50 border-purple-200' },
    ];

    const App = () => {
        const [isChatOpen, setIsChatOpen] = useState(false);
        const [formData, setFormData] = useState(EMPTY_FORM);
        const [formStatus, setFormStatus] = useState('idle');
        const [chatInput, setChatInput] = useState('');
        const [isTyping, setIsTyping] = useState(false);
        const [messages, setMessages] = useState([
            { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Cuál es tu nombre?' }
        ]);
        const chatEndRef = useRef(null);

        const sessionId = useMemo(() => {
            const saved = localStorage.getItem('mig_ep_session_v12');
            if (saved) return saved;
            const nid = "web_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('mig_ep_session_v12', nid);
            return nid;
        }, []);

        useEffect(() => {
            const timer = setTimeout(() => setIsChatOpen(true), 8000);
            return () => clearTimeout(timer);
        }, []);

        useEffect(() => {
            if (isChatOpen) chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages, isTyping, isChatOpen]);

        const handleFormSubmit = async (e) => {
            e.preventDefault();
            if (formStatus === 'loading') return;
            if (!formData.nombre || !formData.email || !formData.telefono || !formData.servicio) return;
            setFormStatus('loading');

            const payload = {
                mensaje:  "REGISTRO_MANUAL_WEB",
                nombre:   formData.nombre,
                email:    formData.email,
                celular:  formData.telefono,
                servicio: formData.servicio
            };

            // ── ESTRATEGIA: iframe oculto como target del form ──────────────────
            // fetch con no-cors falla cuando el deployment de GAS cambia de URL
            // o cuando el navegador bloquea el body en preflight.
            // Un <form> nativo con target a un iframe oculto NO tiene restricción
            // de CORS: el browser envía el POST directamente y el GAS lo recibe
            // sin importar la respuesta (que va al iframe y se ignora).
            // ────────────────────────────────────────────────────────────────────
            try {
                // Crear iframe oculto como receptor
                let iframe = document.getElementById('_gasIframe');
                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.name = '_gasIframe';
                    iframe.id   = '_gasIframe';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                }

                // Crear form dinámico apuntando al iframe
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = SCRIPT_URL;
                form.target = '_gasIframe';
                form.style.display = 'none';

                // Un solo campo con el JSON completo
                const field = document.createElement('input');
                field.type  = 'hidden';
                field.name  = 'payload';
                field.value = JSON.stringify(payload);
                form.appendChild(field);

                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);

                // Dar 1 segundo para que el request salga antes de mostrar éxito
                await new Promise(r => setTimeout(r, 1000));

                setFormStatus('success');
                setFormData(EMPTY_FORM);

                const waMsg = encodeURIComponent(`Hola, soy ${payload.nombre}. Me interesa ${payload.servicio}.`);
                setTimeout(() => { window.open(`https://wa.me/51924200094?text=${waMsg}`, '_blank'); }, 800);
                setTimeout(() => setFormStatus('idle'), 4000);

            } catch (err) {
                console.error("Form error:", err);
                setFormStatus('error');
                setTimeout(() => setFormStatus('idle'), 3000);
            }
        };

        const enviarMensajeChat = async () => {
            if (!chatInput.trim()) return;
            const msg = chatInput.trim();
            setMessages(prev => [...prev, { role: 'user', text: msg }]);
            setChatInput('');
            setIsTyping(true);
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ mensaje: msg, celular: sessionId })
                });
                const data = await response.json();
                setMessages(prev => [...prev, { role: 'bot', text: data.respuesta }]);
            } catch (e) {
                setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, tuve un problema. ¿Podrías intentar de nuevo?" }]);
            } finally {
                setIsTyping(false);
            }
        };

        const formBtnLabel = {
            idle:    { text: "Registrar y Validar",           icon: "person_add",    cls: "bg-slate-900 hover:bg-primary" },
            loading: { text: "Registrando…",                   icon: "hourglass_top", cls: "bg-slate-400 cursor-not-allowed" },
            success: { text: "¡Registrado! Abriendo WhatsApp…", icon: "check_circle", cls: "bg-green-500" },
            error:   { text: "Error — intenta de nuevo",        icon: "error",         cls: "bg-rose-500" },
        }[formStatus];

        return (
            <div className="min-h-screen flex flex-col overflow-x-hidden">

                {/* ── BARRA ACADÉMICA ── */}
                <div className="bg-secondary text-white text-[10px] py-2 text-center font-black tracking-[0.2em] uppercase">
                    CAPSTONE PROJECT · CUC UNIVERSITY · MAESTRÍA EN MARKETING · INNOVATION &amp; STRATEGIC SOLUTION LAB
                </div>

                {/* ── NAV ── */}
                <nav className="sticky top-0 z-50 glass-panel border-b border-slate-200">
                    <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center shadow-xl text-primary">
                                <span className="material-icons-outlined text-3xl">terminal</span>
                            </div>
                            <div>
                                <span className="text-xl font-black text-slate-900 tracking-tighter uppercase italic block leading-none">Growth<span className="text-primary">Lab</span></span>
                                <span className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Dental · Innovation Engine</span>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center gap-6">
                            <a href="#problema"    className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Problema</a>
                            <a href="#metodologia" className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Metodología</a>
                            <a href="#solucion"    className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Solución</a>
                            <a href="#arquitectura" className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Arquitectura</a>
                            <a href="#dashboard"   className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">Validación</a>
                            <div className="h-8 w-px bg-slate-200"></div>
                            <span className="text-[10px] font-black text-green-500 bg-green-50 px-3 py-1 rounded-full uppercase">Sede Chacarilla · Live</span>
                        </div>
                    </div>
                </nav>

                <main className="flex-1">

                    {/* ── 1. HERO ── */}
                    <section className="text-center py-24 px-4 gradient-bg border-b border-slate-100">
                        <div className="max-w-4xl mx-auto">
                            <div className="inline-flex items-center gap-2 bg-white border border-slate-200 rounded-full px-4 py-2 mb-8 shadow-sm">
                                <span className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">Piloto activo · Sonrisa Segura Chacarilla</span>
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black text-secondary leading-[1.1] tracking-tight">
                                Las clínicas dentales pierden hasta<br/>
                                <span className="text-primary underline decoration-slate-200 underline-offset-8">40% de sus pacientes</span><br/>
                                por mala gestión de leads
                            </h1>
                            <p className="mt-8 text-lg lg:text-xl text-slate-500 max-w-2xl mx-auto leading-relaxed">
                                <span className="font-bold text-slate-700">MIG-EP</span> es un modelo de transformación comercial que estructura el journey del paciente desde el primer contacto digital hasta el seguimiento post-tratamiento.
                            </p>
                            <div className="mt-12 flex flex-wrap justify-center gap-4">
                                <button onClick={() => setIsChatOpen(true)} className="bg-primary text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-2xl hover:scale-105 transition-all flex items-center gap-3">
                                    <span className="material-icons-outlined">psychology</span> Demo en Vivo
                                </button>
                                <a href="#metodologia" className="bg-white border border-slate-200 text-slate-600 px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-slate-50 transition-all flex items-center gap-3">
                                    <span className="material-icons-outlined">schema</span> Ver Metodología
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* ── 2. PROBLEMA ── */}
                    <section id="problema" className="py-24 bg-white border-b border-slate-50">
                        <div className="max-w-5xl mx-auto px-4">
                            <div className="text-center mb-16">
                                <span className="text-primary font-black uppercase tracking-[0.3em] text-[10px] bg-sky-50 px-4 py-1 rounded-full">Diagnóstico del Sector · Lima, Perú</span>
                                <h2 className="text-3xl lg:text-4xl font-black text-secondary mt-4">Puntos de Fuga en la Gestión Odontológica</h2>
                            </div>
                            <div className="grid md:grid-cols-2 gap-12 items-center">
                                <div>
                                    <p className="text-lg text-slate-600 leading-relaxed italic border-l-4 border-primary pl-6 mb-8">
                                        "En el sector odontológico peruano, el desorden en WhatsApp y la falta de trazabilidad generan una experiencia fragmentada, resultando en altas tasas de inasistencia y pérdida de rentabilidad."
                                    </p>
                                    <p className="text-sm text-slate-500 leading-relaxed">
                                        Validado mediante entrevistas semiestructuradas al personal administrativo de Sonrisa Segura (13 sedes, Lima) y análisis de registros históricos de contacto y agendamiento.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {[
                                        { t: 'Leads sin seguimiento',  d: 'Consultas que se pierden en el historial de WhatsApp sin trazabilidad.' },
                                        { t: 'No-show elevado',        d: 'Falta de protocolos de confirmación automática de citas.' },
                                        { t: 'Falta de indicadores',   d: 'Decisiones basadas en intuición, no en datos medibles.' },
                                        { t: 'Proceso reactivo',       d: 'Sin modelo estandarizado de seguimiento post-tratamiento.' }
                                    ].map((item, i) => (
                                        <div key={i} className="flex items-start gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                            <span className="material-icons-outlined text-rose-500 mt-0.5">error_outline</span>
                                            <div>
                                                <h3 className="font-bold text-secondary text-sm">{item.t}</h3>
                                                <p className="text-xs text-slate-400 mt-1">{item.d}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ── 3. METODOLOGÍA DESIGN THINKING ── ⭐ NUEVA SECCIÓN ── */}
                    <section id="metodologia" className="py-24 bg-slate-50 border-b border-slate-100">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="text-center mb-16">
                                <span className="text-accent font-black uppercase tracking-[0.3em] text-[10px] bg-teal-50 px-4 py-1 rounded-full">Metodología Aplicada</span>
                                <h2 className="text-3xl lg:text-4xl font-black text-secondary mt-4">Design Thinking + Challenge-Based Learning</h2>
                                <p className="text-slate-500 mt-4 max-w-2xl mx-auto text-sm leading-relaxed">
                                    El desarrollo del modelo MIG-EP siguió las 5 fases del Design Thinking, aplicadas al contexto real del sector odontológico privado en Lima.
                                </p>
                            </div>

                            {/* Fases DT — desktop: horizontal, mobile: vertical */}
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-4 relative">
                                {DT_PHASES.map((phase, i) => (
                                    <div key={i} className={`relative bg-white rounded-[2rem] border-2 p-6 shadow-sm hover:shadow-xl transition-all hover:-translate-y-1 ${phase.color.split(' ')[1]} ${phase.color.split(' ')[2]}`}>
                                        {/* Número */}
                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-3">{phase.num}</div>
                                        {/* Icono */}
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-4 ${phase.color.split(' ')[0]}`}>
                                            <span className={`material-icons-outlined text-2xl ${phase.iconColor}`}>{phase.icon}</span>
                                        </div>
                                        {/* Fase */}
                                        <h3 className="font-black text-secondary text-sm uppercase tracking-wide mb-2">{phase.fase}</h3>
                                        {/* Descripción */}
                                        <p className="text-[11px] text-slate-500 leading-relaxed mb-4">{phase.desc}</p>
                                        {/* Output */}
                                        <div className="bg-slate-50 rounded-xl p-3 border border-slate-100">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Output</p>
                                            <p className="text-[11px] text-slate-600 font-medium">{phase.output}</p>
                                        </div>
                                        {/* Conector flecha (desktop) */}
                                        {i < DT_PHASES.length - 1 && (
                                            <div className="hidden md:block absolute -right-3 top-1/2 -translate-y-1/2 z-20 w-6 h-6 bg-white rounded-full border-2 border-primary flex items-center justify-center shadow-sm">
                                                <span className="material-icons-outlined text-primary text-sm">chevron_right</span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            {/* Reto central HMW */}
                            <div className="mt-12 bg-secondary text-white rounded-[2rem] p-8 text-center">
                                <p className="text-[10px] font-black uppercase tracking-[0.3em] text-sky-300 mb-3">Challenge Statement (HMW)</p>
                                <p className="text-xl md:text-2xl font-black italic leading-relaxed">
                                    "¿Cómo podríamos estructurar el proceso de atención digital en clínicas odontológicas para reducir la pérdida de leads, disminuir los no-shows y generar decisiones basadas en datos, sin requerir inversión tecnológica compleja?"
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* ── 4. SOLUCIÓN MIG-EP ── */}
                    <section id="solucion" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <span className="text-primary font-black uppercase tracking-[0.3em] text-[10px] bg-sky-50 px-4 py-1 rounded-full">La Solución</span>
                            <h2 className="text-3xl lg:text-5xl font-black text-secondary mb-4 mt-4 italic">Modelo <span className="text-primary">MIG-EP</span></h2>
                            <p className="text-slate-400 uppercase font-bold tracking-[0.4em] text-[10px] mb-4">Modelo Integral de Gestión Comercial y Experiencia del Paciente</p>
                            <p className="text-slate-500 max-w-2xl mx-auto text-sm mb-16 leading-relaxed">
                                Framework operativo de 4 pilares que transforma el proceso reactivo de atención vía WhatsApp en un sistema estratégico, medible y escalable.
                            </p>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[
                                    { i: 'bolt',        t: 'Captura',      n: '01', d: 'Agente IA Conversacional 24/7 que califica la intención del paciente al instante y agenda citas automáticamente.' },
                                    { i: 'storage',     t: 'Registro',     n: '02', d: 'CRM estructurado en Google Sheets con trazabilidad total del lead: estado, canal, tratamiento y seguimiento.' },
                                    { i: 'sync',        t: 'Seguimiento',  n: '03', d: 'Automatización comercial que elimina el error humano: confirmaciones, recordatorios y gestión de no-shows.' },
                                    { i: 'query_stats', t: 'Analítica',    n: '04', d: 'Dashboard de KPIs en tiempo real en Looker Studio para toma de decisiones estratégicas de gerencia.' }
                                ].map((item, idx) => (
                                    <div key={idx} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl hover:border-primary transition-all group">
                                        <div className="text-[10px] font-black text-slate-300 mb-4">{item.n}</div>
                                        <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-secondary mb-6 group-hover:bg-primary group-hover:text-white transition-all">
                                            <span className="material-icons-outlined text-3xl">{item.i}</span>
                                        </div>
                                        <h3 className="text-xs font-black uppercase tracking-widest mb-3">{item.t}</h3>
                                        <p className="text-[11px] text-slate-500 leading-relaxed">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ── 5. ARQUITECTURA TÉCNICA ── ⭐ NUEVA SECCIÓN ── */}
                    <section id="arquitectura" className="py-24 bg-slate-50 border-y border-slate-100">
                        <div className="max-w-5xl mx-auto px-4">
                            <div className="text-center mb-16">
                                <span className="text-primary font-black uppercase tracking-[0.3em] text-[10px] bg-sky-50 px-4 py-1 rounded-full">Stack Tecnológico</span>
                                <h2 className="text-3xl lg:text-4xl font-black text-secondary mt-4">Arquitectura del Sistema</h2>
                                <p className="text-slate-500 mt-4 text-sm max-w-xl mx-auto leading-relaxed">
                                    Solución 100% en la nube, sin costos de infraestructura, construida sobre herramientas del ecosistema Google para máxima accesibilidad y escalabilidad.
                                </p>
                            </div>

                            {/* Flujo de arquitectura */}
                            <div className="flex flex-col md:flex-row items-center justify-center gap-2 md:gap-0 mb-16">
                                {ARCH_NODES.map((node, i) => (
                                    <React.Fragment key={i}>
                                        <div className={`flex flex-col items-center p-6 rounded-[2rem] border-2 w-44 ${node.color} shadow-sm hover:shadow-lg transition-all`}>
                                            <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm mb-3">
                                                <span className="material-icons-outlined text-secondary text-3xl">{node.icon}</span>
                                            </div>
                                            <p className="text-xs font-black text-secondary text-center leading-tight mb-1">{node.label}</p>
                                            <p className="text-[10px] text-slate-400 text-center">{node.sub}</p>
                                        </div>
                                        {i < ARCH_NODES.length - 1 && (
                                            <div className="flex items-center justify-center w-12 h-8 flex-shrink-0">
                                                <span className="material-icons-outlined text-primary text-3xl hidden md:block">chevron_right</span>
                                                <span className="material-icons-outlined text-primary text-3xl md:hidden">expand_more</span>
                                            </div>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>

                            {/* Detalles técnicos grid */}
                            <div className="grid md:grid-cols-3 gap-6">
                                {[
                                    {
                                        icon: 'psychology',
                                        title: 'Agente IA (GAS)',
                                        color: 'border-sky-200 bg-sky-50',
                                        iconColor: 'text-sky-600',
                                        items: ['Flujo conversacional por fases', 'Detección de tratamiento por NLP', 'Gestión de sesiones con CacheService', 'Confirmación automática por email']
                                    },
                                    {
                                        icon: 'table_chart',
                                        title: 'CRM en Google Sheets',
                                        color: 'border-green-200 bg-green-50',
                                        iconColor: 'text-green-600',
                                        items: ['Hoja 1: CRM principal de leads', 'Hoja Citas: agenda de pacientes', 'Hoja Horarios: disponibilidad', 'Hoja Servicios: precios y catálogo']
                                    },
                                    {
                                        icon: 'bar_chart',
                                        title: 'Analytics (Looker Studio)',
                                        color: 'border-purple-200 bg-purple-50',
                                        iconColor: 'text-purple-600',
                                        items: ['Índice MIG-EP (0–100)', 'Funnel de conversión visual', 'Distribución por servicio', 'SLA de respuesta en tiempo real']
                                    }
                                ].map((block, i) => (
                                    <div key={i} className={`rounded-[2rem] border-2 p-6 ${block.color}`}>
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className={`material-icons-outlined text-2xl ${block.iconColor}`}>{block.icon}</span>
                                            <h3 className="font-black text-secondary text-sm">{block.title}</h3>
                                        </div>
                                        <ul className="space-y-2">
                                            {block.items.map((item, j) => (
                                                <li key={j} className="flex items-center gap-2 text-[11px] text-slate-600">
                                                    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${block.iconColor.replace('text-', 'bg-')}`}></span>
                                                    {item}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ── 6. DASHBOARD (Looker Studio) ── */}
                    <section id="dashboard" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="text-center mb-12">
                                <span className="text-primary font-black uppercase tracking-[0.3em] text-[10px] bg-sky-50 px-4 py-1 rounded-full">Evidencia de Validación</span>
                                <h2 className="text-3xl lg:text-4xl font-black text-secondary mt-4">Resultados en Tiempo Real</h2>
                                <p className="text-slate-500 mt-4 italic text-sm">Datos del piloto activo en Sede Chacarilla — sincronización automática desde Google Sheets</p>
                            </div>
                            <div className="bg-white p-4 rounded-[3.5rem] shadow-2xl border border-slate-100 flex flex-col h-[650px] relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-primary"></div>
                                <div className="flex justify-between items-center px-8 py-4 border-b border-slate-50">
                                    <div className="flex items-center gap-3">
                                        <span className="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
                                        <h3 className="font-black uppercase tracking-widest text-[10px] text-slate-400 italic">Analítica Estratégica — Looker Studio</h3>
                                    </div>
                                    <span className="text-[9px] font-black text-primary bg-sky-50 px-3 py-1 rounded-full uppercase italic">Live Sincro</span>
                                </div>
                                <div className="flex-1 rounded-[2.5rem] overflow-hidden bg-slate-50 mt-4 relative">
                                    <iframe
                                        src="https://lookerstudio.google.com/embed/reporting/81a4bc5e-2ab0-47ba-97df-958db6ec4bb4/page/9tlqF"
                                        className="w-full h-full border-none"
                                        allowFullScreen
                                    />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ── 7. KPIs DE VALIDACIÓN ── con contexto ── */}
                    <section className="py-24 bg-slate-900 text-white relative overflow-hidden">
                        <div className="absolute -top-20 -right-20 w-80 h-80 bg-primary opacity-10 blur-[100px]"></div>
                        <div className="absolute -bottom-20 -left-20 w-60 h-60 bg-accent opacity-10 blur-[80px]"></div>
                        <div className="max-w-5xl mx-auto px-4 text-center relative z-10">
                            <span className="text-accent font-black uppercase tracking-[0.3em] text-[10px] bg-teal-900/50 px-4 py-1 rounded-full">KPIs del Piloto</span>
                            <h2 className="text-3xl font-black mt-4 mb-4 italic">Impacto de la Validación</h2>
                            <p className="text-slate-400 leading-relaxed max-w-2xl mx-auto mb-4 text-sm">
                                Resultados medidos durante el período de piloto activo en Sede Chacarilla. Muestra: <strong className="text-white">59 leads registrados</strong> via chatbot IA y formulario web.
                            </p>
                            <p className="text-slate-500 text-[11px] mb-16">Período: Febrero–Marzo 2026 · Canal: WhatsApp + Landing Page · Herramienta: Google Apps Script + Sheets</p>

                            <div className="grid md:grid-cols-3 gap-8 mb-12">
                                {/* KPI 1 */}
                                <div className="kpi-card bg-white/5 border border-white/10 p-10 rounded-[2.5rem] backdrop-blur-sm">
                                    <h3 className="text-6xl font-black text-primary mb-2">45.7%</h3>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">Tasa de Conversión</p>
                                    <p className="text-xs text-slate-500 leading-relaxed">Leads que pasaron de consulta inicial a cita agendada. <span className="text-slate-300">Benchmark sector: 20–30%.</span></p>
                                </div>
                                {/* KPI 2 */}
                                <div className="kpi-card bg-white/5 border border-white/10 p-10 rounded-[2.5rem] backdrop-blur-sm">
                                    <h3 className="text-6xl font-black text-primary mb-2">4.8m</h3>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">SLA de Respuesta</p>
                                    <p className="text-xs text-slate-500 leading-relaxed">Tiempo promedio de primera respuesta del agente IA. <span className="text-slate-300">Sin el sistema: +4 horas promedio.</span></p>
                                </div>
                                {/* KPI 3 */}
                                <div className="kpi-card bg-white/5 border border-white/10 p-10 rounded-[2.5rem] backdrop-blur-sm">
                                    <h3 className="text-6xl font-black text-primary mb-2">48.1%</h3>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">No-show Identificado</p>
                                    <p className="text-xs text-slate-500 leading-relaxed">Pacientes que agendaron pero no se presentaron, ahora trazables para seguimiento. <span className="text-slate-300">Antes: dato invisible.</span></p>
                                </div>
                            </div>

                            {/* Índice MIG-EP */}
                            <div className="bg-white/5 border border-white/10 rounded-[2.5rem] p-8 backdrop-blur-sm">
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Índice MIG-EP — Indicador Compuesto de Gestión Comercial (0–100)</p>
                                <div className="flex items-center justify-center gap-4">
                                    <span className="text-5xl font-black text-yellow-400">64.5</span>
                                    <div className="text-left">
                                        <p className="text-sm font-bold text-yellow-300">Gestión Regular</p>
                                        <p className="text-xs text-slate-400">−10.5 pts vs meta de 75 pts</p>
                                        <p className="text-xs text-slate-500 mt-1">Oportunidad de mejora identificada y documentada</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ── 8. REGISTRO MANUAL / CTA ── */}
                    <section className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-16 items-center">
                            <div className="space-y-6">
                                <span className="text-primary font-black uppercase tracking-[0.3em] text-[10px] bg-sky-50 px-4 py-1 rounded-full">Sistema en Producción</span>
                                <h2 className="text-4xl font-black text-secondary leading-tight mt-4">Convierte tus leads en<br/><span className="text-primary italic">ingresos reales</span></h2>
                                <p className="text-slate-500 leading-relaxed text-sm">
                                    El modelo MIG-EP es un sistema de gestión comercial escalable, diseñado para clínicas odontológicas que buscan profesionalizar su proceso digital sin inversión tecnológica compleja.
                                </p>
                                <div className="space-y-3">
                                    {[
                                        '13 sedes con el mismo problema identificado',
                                        'Stack 100% gratuito (Google Workspace)',
                                        'Tiempo de implementación: 2 semanas',
                                        'Replicable a cualquier clínica del sector'
                                    ].map((item, i) => (
                                        <div key={i} className="flex items-center gap-3 text-sm text-slate-600">
                                            <span className="material-icons-outlined text-green-500 text-base">check_circle</span>
                                            {item}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setIsChatOpen(true)} className="bg-secondary text-white px-10 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-primary transition-all active:scale-95">
                                    Activar Demo del Agente IA
                                </button>
                            </div>

                            {/* FORM */}
                            <div className="bg-slate-50 p-8 rounded-[3rem] border border-slate-100 shadow-inner relative overflow-hidden">
                                {formStatus === 'success' && (
                                    <div className="absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center z-10 rounded-[3rem] animate-slide">
                                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4 check-pop">
                                            <span className="material-icons-outlined text-green-500 text-5xl">check_circle</span>
                                        </div>
                                        <h4 className="text-xl font-black text-secondary mb-1">¡Lead Registrado en CRM!</h4>
                                        <p className="text-sm text-slate-500 text-center max-w-[220px]">Datos guardados en Google Sheets. Abriendo WhatsApp…</p>
                                    </div>
                                )}
                                <h3 className="text-xl font-bold mb-2 flex items-center gap-2">
                                    <span className="material-icons-outlined text-primary">person_add</span>
                                    Registro de Lead · CRM MIG-EP
                                </h3>
                                <p className="text-xs text-slate-400 mb-6">Los datos se registran en tiempo real en Google Sheets</p>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Nombre completo" disabled={formStatus === 'loading'}
                                        className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary transition-all disabled:opacity-50"
                                        value={formData.nombre} onChange={e => setFormData({...formData, nombre: e.target.value})} />
                                    <input type="email" placeholder="Correo electrónico" disabled={formStatus === 'loading'}
                                        className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary transition-all disabled:opacity-50"
                                        value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    <input type="tel" placeholder="WhatsApp (ej: 999888777)" disabled={formStatus === 'loading'}
                                        className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary transition-all disabled:opacity-50"
                                        value={formData.telefono} onChange={e => setFormData({...formData, telefono: e.target.value})} />
                                    <select disabled={formStatus === 'loading'}
                                        className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-primary transition-all italic text-slate-400 disabled:opacity-50"
                                        value={formData.servicio} onChange={e => setFormData({...formData, servicio: e.target.value})}>
                                        <option value="">Tratamiento de Interés</option>
                                        <option value="Evaluacion Dental">Evaluacion Dental</option>
                                        <option value="Profilaxis Pro">Profilaxis Pro</option>
                                        <option value="Implantes Dentales">Implantes Dentales</option>
                                        <option value="Estetica Dental">Estetica Dental</option>
                                        <option value="Ortodoncia">Ortodoncia</option>
                                        <option value="Blanqueamiento">Blanqueamiento</option>
                                        <option value="Endodoncia">Endodoncia</option>
                                    </select>
                                    <button
                                        disabled={formStatus === 'loading' || !formData.nombre || !formData.email || !formData.telefono || !formData.servicio}
                                        onClick={handleFormSubmit}
                                        className={`w-full text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 ${formBtnLabel.cls} disabled:opacity-60 disabled:cursor-not-allowed disabled:scale-100`}>
                                        <span className="material-icons-outlined text-base">{formBtnLabel.icon}</span>
                                        {formBtnLabel.text}
                                    </button>
                                    <p className="text-[10px] text-slate-400 text-center leading-relaxed">
                                        🔒 Datos registrados en CRM MIG-EP · Google Sheets · Capstone CUC University
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ── 9. ESCALABILIDAD ── */}
                    <section className="py-16 bg-slate-50 border-t border-slate-100">
                        <div className="max-w-5xl mx-auto px-4 text-center">
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 mb-8">Potencial de Replicabilidad</p>
                            <div className="grid md:grid-cols-4 gap-6">
                                {[
                                    { icon: 'account_tree', n: '13', label: 'Sedes Sonrisa Segura', sub: 'con el mismo problema' },
                                    { icon: 'location_city', n: '500+', label: 'Clínicas en Lima', sub: 'mercado objetivo' },
                                    { icon: 'attach_money', n: 'S/.0', label: 'Costo de Stack', sub: 'Google Workspace' },
                                    { icon: 'rocket_launch', n: '2 sem', label: 'Time to Deploy', sub: 'por nueva sede' },
                                ].map((s, i) => (
                                    <div key={i} className="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm text-center">
                                        <span className="material-icons-outlined text-primary text-3xl mb-3 block">{s.icon}</span>
                                        <p className="text-3xl font-black text-secondary">{s.n}</p>
                                        <p className="text-xs font-bold text-slate-600 mt-1">{s.label}</p>
                                        <p className="text-[10px] text-slate-400 mt-0.5">{s.sub}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                </main>

                {/* ── FOOTER ── */}
                <footer className="bg-secondary text-white py-12 border-t border-white/5">
                    <div className="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8 text-[10px] font-bold uppercase tracking-[0.2em]">
                        <div className="text-center md:text-left">
                            <span className="text-lg italic tracking-tighter">Growth<span className="text-primary">Lab</span></span>
                            <p className="text-slate-400 mt-1">Dental Innovation Lab © 2026</p>
                        </div>
                        <div className="text-center">
                            <p className="text-slate-300">Modelo MIG-EP · Capstone Project</p>
                            <p className="text-slate-500 mt-1">Innovation & Strategic Solution Lab · CUC University</p>
                        </div>
                        <div className="text-center md:text-right">
                            <span className="text-slate-300">Frank Espinoza</span>
                            <p className="text-slate-500 mt-1">Maestría en Marketing</p>
                        </div>
                    </div>
                </footer>

                {/* ── CHAT WIDGET ── */}
                <div className={`fixed bottom-6 right-6 z-[100] transition-all duration-500 transform ${isChatOpen ? 'scale-100 opacity-100 translate-y-0' : 'scale-90 opacity-0 translate-y-10 pointer-events-none'}`}>
                    <div className="w-[340px] sm:w-[400px] bg-white rounded-[2.5rem] shadow-[0_20px_80px_-15px_rgba(0,0,0,0.3)] border border-slate-100 flex flex-col h-[580px] overflow-hidden">
                        <div className="bg-secondary p-6 text-white flex justify-between items-center shadow-lg relative overflow-hidden">
                            <div className="absolute -top-4 -right-4 w-20 h-20 bg-primary/20 rounded-full blur-xl"></div>
                            <div className="flex items-center gap-4 relative z-10">
                                <div className="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-white/10">
                                    <span className="material-icons-outlined text-primary">smart_toy</span>
                                </div>
                                <div>
                                    <h4 className="text-sm font-bold leading-none mb-1 tracking-tight">Agente IA · MIG-EP</h4>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                                        <span className="text-[9px] text-sky-300 font-bold uppercase tracking-widest">En línea · v12.5</span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => setIsChatOpen(false)} className="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors relative z-10">
                                <i className="material-icons-outlined text-lg">close</i>
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 chat-scroll">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`p-4 rounded-2xl text-[13px] leading-relaxed max-w-[85%] shadow-sm font-medium ${
                                        m.role === 'user'
                                        ? 'bg-primary text-white rounded-tr-none'
                                        : 'bg-white border border-slate-100 text-slate-600 rounded-tl-none'
                                    }`}>
                                        {m.text.split('\n').map((line, idx) => (
                                            <div key={idx}>{line}</div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="bg-white border border-slate-100 px-4 py-3 rounded-2xl rounded-tl-none flex gap-1.5 items-center">
                                        <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                                        <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                                        <div className="w-1.5 h-1.5 bg-sky-400 rounded-full animate-bounce"></div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>
                        <div className="p-5 bg-white border-t border-slate-50 flex gap-3">
                            <input type="text"
                                className="flex-1 bg-slate-100 rounded-2xl px-5 text-sm outline-none border-none focus:ring-2 focus:ring-primary/30 transition-all"
                                placeholder="Escribe tu mensaje..."
                                value={chatInput}
                                onChange={e => setChatInput(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && enviarMensajeChat()}
                            />
                            <button onClick={enviarMensajeChat}
                                className="bg-primary text-white w-12 h-12 rounded-2xl hover:bg-secondary transition-all flex items-center justify-center shadow-lg shadow-sky-100 active:scale-90">
                                <span className="material-icons-outlined">send</span>
                            </button>
                        </div>
                    </div>
                </div>

                {/* BOTÓN FLOTANTE */}
                {!isChatOpen && (
                    <button onClick={() => setIsChatOpen(true)}
                        className="fixed bottom-8 right-8 w-20 h-20 bg-primary text-white rounded-[2rem] shadow-[0_20px_50px_-10px_rgba(14,165,233,0.5)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-[90] group">
                        <i className="material-icons-outlined text-4xl group-hover:rotate-12 transition-transform">forum</i>
                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full border-2 border-white flex items-center justify-center text-[10px] font-black">1</span>
                    </button>
                )}

            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
