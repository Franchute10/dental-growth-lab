<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MIG-EP v2.0 - Optimización Dental</title>
    
    <!-- Librerías de React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0ea5e9",
                        secondary: "#23c2ad",
                    },
                    fontFamily: {
                        body: ["Outfit", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        .gradient-bg { background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(35, 194, 173, 0.05) 100%); }
        #chatMessages::-webkit-scrollbar { width: 4px; }
        #chatMessages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i className={`material-icons-outlined ${className}`} style={{ fontSize: size }}>{name}</i>;
        };

        // URL DE TU SCRIPT (ASEGÚRATE QUE SEA LA ÚLTIMA VERSIÓN IMPLEMENTADA)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhtIlg32sshx-IkSmI3Lr7xivAFpP8MIpPupE31ZlK8IbOP0JtgpMCK4XS8WWqe-tq/exec";

        const App = () => {
            const [formData, setFormData] = useState({ nombre: '', email: '', telefono: '', servicio: '' });
            const [formStatus, setFormStatus] = useState({ type: '', message: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hola 👋 Soy el asistente IA de Sonrisa Segura Chacarilla. ¿Te gustaría conocer nuestros precios o agendar una evaluación hoy?' }
            ]);
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.id]: e.target.value });
            };

            // REGISTRO DE LEAD (FORMULARIO)
            const enviarLead = async (event) => {
                event.preventDefault();
                setIsSubmitting(true);
                setFormStatus({ type: '', message: '' });

                const payload = {
                    nombre: formData.nombre,
                    email: formData.email,
                    celular: formData.telefono.replace(/\D/g, ''),
                    servicio: formData.servicio,
                    fuente: "Formulario Web v2.0",
                    timestamp_entrada: new Date().toISOString()
                };

                try {
                    // Para registro simple usamos no-cors para evitar bloqueos
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(payload)
                    });

                    setFormStatus({ type: 'success', message: '✅ Registro exitoso en Columna N. Redirigiendo...' });
                    
                    setTimeout(() => {
                        window.open(`https://wa.me/51924200094?text=Hola, soy ${formData.nombre}. Consulto por ${formData.servicio}.`, '_blank');
                        setFormData({ nombre: '', email: '', telefono: '', servicio: '' });
                        setIsSubmitting(false);
                    }, 2000);

                } catch (error) {
                    setFormStatus({ type: 'error', message: '❌ Error al conectar con el servidor.' });
                    setIsSubmitting(false);
                }
            };

            // INTERACCIÓN CHATBOT (IA)
            const enviarMensajeChat = async () => {
                if (!chatInput.trim()) return;

                const userMessage = chatInput.trim();
                setMessages(prev => [...prev, { role: 'user', text: userMessage }]);
                setChatInput('');
                setIsTyping(true);

                try {
                    // Para el Chatbot NO usamos no-cors porque necesitamos leer la respuesta JSON
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ 
                            mensaje: userMessage, 
                            fuente: "Chatbot Web",
                            nombre: formData.nombre || "Visitante"
                        })
                    });

                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'bot', text: data.respuesta || "Entendido. ¿En qué más puedo ayudarte?" }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'bot', text: "Lo siento, tuve un problema de conexión. ¿Puedes intentar de nuevo?" }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-700">
                    
                    <div className="bg-slate-900 text-white text-[10px] py-2 text-center font-black tracking-[0.2em] uppercase">
                        CAPSTONE PROJECT CUC – VALIDACIÓN AGÉNTICA IA (MODALIDAD 3)
                    </div>

                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <Icon name="psychology" size={24} />
                                </div>
                                <div className="flex flex-col">
                                    <span className="text-xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">
                                        Growth<span className="text-sky-500">Lab</span> <span className="text-xs align-top">v2.0</span>
                                    </span>
                                    <span className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Ecosistema Agéntico</span>
                                </div>
                            </div>
                            <button 
                                onClick={() => setIsChatOpen(true)}
                                className="bg-sky-500 text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg hover:scale-105 transition-all"
                            >
                                Probar IA
                            </button>
                        </div>
                    </nav>

                    <header className="relative overflow-hidden pt-12 pb-24 border-b border-slate-100 gradient-bg">
                        <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-16 items-center">
                            
                            <div className="bg-white p-8 lg:p-12 rounded-[3rem] shadow-2xl border border-slate-100 relative z-10">
                                <div className="mb-10 text-center lg:text-left">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 bg-sky-50 text-sky-600 rounded-lg mb-4">
                                        <Icon name="bolt" size={14} className="animate-pulse" />
                                        <span className="text-[10px] font-black uppercase tracking-widest">Validación v2.0 Activa</span>
                                    </div>
                                    <h2 className="text-4xl lg:text-5xl font-black text-slate-900 tracking-tight leading-[0.9] italic mb-4">
                                        Cero Fugas de <br/><span className="text-sky-500">Leads con IA</span>
                                    </h2>
                                </div>

                                <form onSubmit={enviarLead} className="space-y-4">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <input type="text" id="nombre" placeholder="Nombre completo" required className="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-sky-500" value={formData.nombre} onChange={handleInputChange} />
                                        <input type="email" id="email" placeholder="Email" required className="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-sky-500" value={formData.email} onChange={handleInputChange} />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <input type="tel" id="telefono" placeholder="WhatsApp" required className="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-sky-500" value={formData.telefono} onChange={handleInputChange} />
                                        <select id="servicio" required className="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-sky-500 italic" value={formData.servicio} onChange={handleInputChange}>
                                            <option value="">Tratamiento</option>
                                            <option value="Ortodoncia">Ortodoncia</option>
                                            <option value="Implantes Dentales">Implantes Dentales</option>
                                            <option value="Profilaxis Pro">Profilaxis Pro</option>
                                            <option value="Carillas">Carillas</option>
                                        </select>
                                    </div>
                                    <button type="submit" disabled={isSubmitting} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-sky-600 transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-3">
                                        <Icon name={isSubmitting ? 'sync' : 'rocket_launch'} className={isSubmitting ? 'animate-spin' : ''} />
                                        {isSubmitting ? 'Registrando...' : 'Registrar Lead Agéntico'}
                                    </button>
                                    {formStatus.message && <p className="text-[10px] text-center font-bold italic mt-2 text-green-500">{formStatus.message}</p>}
                                </form>
                            </div>

                            <div id="dashboard" className="bg-white p-4 rounded-[2.5rem] shadow-2xl border border-slate-100">
                                <iframe src="https://lookerstudio.google.com/embed/reporting/81a4bc5e-2ab0-47ba-97df-958db6ec4bb4/page/9tlqF" className="w-full aspect-[4/3] rounded-2xl" allowFullScreen />
                            </div>
                        </div>
                    </header>

                    <div className={`fixed bottom-6 right-6 z-[100] transition-all transform ${isChatOpen ? 'scale-100' : 'scale-0'}`}>
                        <div className="w-80 sm:w-96 bg-white rounded-[2rem] shadow-2xl border border-slate-100 flex flex-col h-[500px] overflow-hidden">
                            <div className="bg-slate-900 p-5 text-white flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white relative">
                                        <Icon name="smart_toy" size={24} />
                                        <div className="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-slate-900 rounded-full animate-pulse" />
                                    </div>
                                    <h4 className="text-sm font-bold leading-tight">Asistente Virtual <br/><span className="text-[9px] text-sky-400 font-black uppercase">Sonrisa Segura IA</span></h4>
                                </div>
                                <button onClick={() => setIsChatOpen(false)} className="text-slate-500 hover:text-white"><Icon name="close" /></button>
                            </div>

                            <div id="chatMessages" className="flex-1 overflow-y-auto p-5 space-y-4 bg-slate-50">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-4 rounded-2xl text-xs leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-sky-500 text-white rounded-tr-none' : 'bg-white text-slate-600 rounded-tl-none border border-slate-100'}`}>
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="bg-white p-3 rounded-2xl w-fit italic text-[10px] text-slate-400 animate-pulse border">IA analizando consulta...</div>}
                                <div ref={chatEndRef} />
                            </div>

                            <div className="p-4 bg-white border-t flex gap-2">
                                <input type="text" placeholder="Pregunta por precios o citas..." className="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 text-xs focus:ring-0" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && enviarMensajeChat()} />
                                <button onClick={enviarMensajeChat} className="bg-sky-500 text-white p-3 rounded-xl shadow-lg"><Icon name="send" /></button>
                            </div>
                        </div>
                    </div>

                    <button onClick={() => setIsChatOpen(true)} className={`fixed bottom-6 right-6 w-16 h-16 bg-sky-500 text-white rounded-2xl shadow-2xl flex items-center justify-center transition-all ${isChatOpen ? 'opacity-0 scale-0' : 'opacity-100 scale-100'}`}>
                        <Icon name="message" size={30} />
                    </button>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
